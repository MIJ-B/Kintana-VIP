name: kintana
description: KINTANA — VIP Trading App with JORO AI & JOROpredict
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebSocket & HTTP
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Chart (custom candlestick via CustomPainter — no external chart lib needed)
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.1.0
  vibration: ^1.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
